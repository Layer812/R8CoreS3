; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples

; https://docs.platformio.org/page/projectconf.html

[env:m5stack-stamps3]
platform = espressif32
board = m5stack-stamps3
framework = arduino
; .pio directory is a junction to C:\.pio_build\PC8 to avoid OneDrive sync issues
monitor_speed = 115200
; monitor_rts = 1
; monitor_dtr = 1
monitor_filters = esp32_exception_decoder
upload_port = COM5
upload_speed = 460800
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_qspi
build_unflags =
    -std=gnu++11
    -std=c++11
build_flags = 
    -O3
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CONFIG_ARDUHAL_LOG_COLORS=1
    -DCARDPUTER_HOST=1
    -DLUA_USE_LONGJMP
    -std=gnu++17
    -I lib
    -I lib/lodepng
    -I lib/miniz
    -I lib/simpleini
    -I lib/z8lua
    -I lib/z8lua/include/fix32
lib_deps =
    m5stack/M5Unified@^0.2.14
    m5stack/M5Cardputer@^1.0.3
;extra_scripts = pre_link.py
board_build.partitions = partitions.csv

; ── PC側コンパイルツール（Windows native build） ───────────────
[env:native_tool]
platform = native
; Upload disabled by patching native builder (tools/patch_native.py)
build_src_filter =
    -<*>
    +<../tools/pc8_compile.cpp>
    +<../lib/z8lua/lapi.cpp>
    +<../lib/z8lua/lcode.cpp>
    +<../lib/z8lua/lctype.cpp>
    +<../lib/z8lua/ldebug.cpp>
    +<../lib/z8lua/ldo.cpp>
    +<../lib/z8lua/ldump.cpp>
    +<../lib/z8lua/lfunc.cpp>
    +<../lib/z8lua/lgc.cpp>
    +<../lib/z8lua/llex.cpp>
    +<../lib/z8lua/lmem.cpp>
    +<../lib/z8lua/lobject.cpp>
    +<../lib/z8lua/lopcodes.cpp>
    +<../lib/z8lua/lparser.cpp>
    +<../lib/z8lua/lstate.cpp>
    +<../lib/z8lua/lstring.cpp>
    +<../lib/z8lua/ltable.cpp>
    +<../lib/z8lua/ltm.cpp>
    +<../lib/z8lua/lundump.cpp>
    +<../lib/z8lua/lvm.cpp>
    +<../lib/z8lua/lzio.cpp>
    +<../lib/z8lua/lauxlib.cpp>
    +<../lib/z8lua/lbaselib.cpp>
    +<../lib/z8lua/lcorolib.cpp>
    +<../lib/z8lua/ldblib.cpp>
    +<../lib/z8lua/ltablib.cpp>
    +<../lib/z8lua/lstrlib.cpp>
    +<../lib/z8lua/lpico8lib.cpp>
    +<../lib/z8lua/linit.cpp>
    +<../lib/z8lua/eris.cpp>
build_flags =
    -std=c++17
    -I lib/z8lua
    -I lib/z8lua/include/fix32
    -I libs
    -I libs/lodepng

